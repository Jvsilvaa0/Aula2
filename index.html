<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cards do Alanzoka</title>
</head>
<body>

    <div class="container">
        <div class="card insta">
            <img src="https://s2-techtudo.glbimg.com/8BoQeTaW_YUlPRaRMHHPx51uCBI=/filters:format(jpeg)/https://i.s3.glbimg.com/v1/AUTH_08fbf48bc0524877943fe86e43087e7a/internal_photos/bs/2019/5/z/JnBUn2Tq21aTTcMveShQ/d8058lwueaar1ew.jfif" alt="Alanzoka Instagram">
            <h2>Instagram Alanzoka</h2>
            <p>Perfil oficial do Alanzoka.</p>
            <a href="https://www.instagram.com/alanzoka/?hl=pt-br" target="_blank">
                <button>Seguir no Insta</button>
            </a>
        </div>

        <div class="card twitch">
            <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/64d44235-1dee-4bca-95da-bee1ee96eea3-profile_image-300x300.png" alt="Alanzoka Twitch">
            <h2>Mestre das Lives</h2>
            <p>Acompanhe as gameplays mais engraçadas e os sustos inesquecíveis ao vivo.</p>
            <a href="https://www.twitch.tv/alanzoka?lang=pt-br" target="_blank">
                <button>Ver na Twitch</button>
            </a>
        </div>

        <div class="card yt">
            <img src="https://i.pinimg.com/474x/b6/a3/84/b6a384e5e46e992ea13a88efbfe2ec11.jpg" alt="Alanzoka YouTube">
            <h2>Vídeos Diários</h2>
            <p>Os melhores momentos das lives e conteúdos exclusivos editados para o YouTube.</p>
            <a href="https://www.youtube.com/@alanzoka" target="_blank">
                <button>Ir para o YouTube</button>
            </a>
        </div>
    </div>

</body>
</html>
